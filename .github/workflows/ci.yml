name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Lint, Type Check & Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate
        env:
          # Prisma generate reads the schema only — dummy URL is fine
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Security audit
        # Fail on high/critical advisories except a documented, justified allowlist
        # (build-time-only transitive advisories we can't fix without breaking the
        # framework). See scripts/check-audit.mjs — strictly narrower than lowering the
        # audit level, so new high/critical runtime vulns still fail the build.
        run: |
          npm audit --json > audit.json || true
          node scripts/check-audit.mjs
